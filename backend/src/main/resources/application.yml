spring:
  application:
    name: vibetube-backend

server:
  address: 0.0.0.0
  port: ${PORT:8080}
  error:
    include-message: always

youtube:
  data-dir: ${YOUTUBE_DATA_DIR:./data}
  activate-url: https://www.youtube.com/activate
  oauth-client-id: ${YOUTUBE_OAUTH_CLIENT_ID:}
  oauth-client-secret: ${YOUTUBE_OAUTH_CLIENT_SECRET:}
  innertube-api-key: ${YOUTUBE_INNERTUBE_API_KEY:}

sponsorblock:
  api:
    url: https://sponsor.ajay.app
