name: vibetube

services:
  yt-dlp:
    image: ${VIBETUBE_YTDLP_IMAGE:-vibetube-ytdlp:local}
    build:
      context: ./yt-dlp-server
    container_name: vibetube-ytdlp
    ports:
      - "8081:8081"
    networks:
      - vibetube
    restart: unless-stopped

  backend:
    image: ${VIBETUBE_BACKEND_IMAGE:-vibetube-backend:local}
    build:
      context: ./backend
    container_name: vibetube-backend
    environment:
      YOUTUBE_DATA_DIR: /data
      YOUTUBE_OAUTH_CLIENT_ID: ${YOUTUBE_OAUTH_CLIENT_ID:-}
      YOUTUBE_OAUTH_CLIENT_SECRET: ${YOUTUBE_OAUTH_CLIENT_SECRET:-}
      YOUTUBE_YTDLP_EXTERNAL_URL: ${YOUTUBE_YTDLP_EXTERNAL_URL:-http://localhost:8081}
      YOUTUBE_INNERTUBE_API_KEY: ${YOUTUBE_INNERTUBE_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - backend-data:/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - yt-dlp
    networks:
      - vibetube

  frontend:
    image: ${VIBETUBE_FRONTEND_IMAGE:-vibetube-frontend:local}
    build:
      context: ./frontend
    container_name: vibetube-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - vibetube

networks:
  vibetube:
    driver: bridge

volumes:
  backend-data:
  ytdlp-cache:
